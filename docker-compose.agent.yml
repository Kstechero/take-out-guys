services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sky_take_out
      MYSQL_USER: ${SKY_MYSQL_USER:-sky}
      MYSQL_PASSWORD: ${SKY_MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${SKY_MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - agent-mysql:/var/lib/mysql
      - ./backend/database/sky.sql:/docker-entrypoint-initdb.d/01-sky.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - agent-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_state
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${AGENT_POSTGRES_PASSWORD}
    volumes:
      - agent-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_state"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AGENT_SERVICE_BASE_URL: http://agent-service:8000
      AGENT_SERVICE_AUTH_TOKEN: ${AGENT_SERVICE_AUTH_TOKEN}
      AGENT_INTERNAL_AUTH_TOKEN: ${AGENT_INTERNAL_AUTH_TOKEN}
      AGENT_INTERNAL_WRITES_ENABLED: ${AGENT_INTERNAL_WRITES_ENABLED:-false}
      SKY_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SKY_DATASOURCE_HOST: mysql
      SKY_DATASOURCE_PORT: 3306
      SKY_DATASOURCE_DATABASE: sky_take_out
      SKY_DATASOURCE_USERNAME: ${SKY_MYSQL_USER:-sky}
      SKY_DATASOURCE_PASSWORD: ${SKY_MYSQL_PASSWORD}
      SKY_REDIS_HOST: redis
      SKY_REDIS_PORT: 6379
      SKY_REDIS_DATABASE: 0
      SKY_REDIS_PASSWORD: ""
      SKY_WECHAT_APPID: ${SKY_WECHAT_APPID:-your-wechat-appid}
      SKY_WECHAT_SECRET: ${SKY_WECHAT_SECRET:-your-wechat-secret}
    ports: ["8080:8080"]
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/doc.html"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  agent-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: agent-service/Dockerfile
    environment:
      APP_ENV: production
      SPRING_INTERNAL_BASE_URL: http://backend:8080
      SPRING_INTERNAL_AUTH_TOKEN: ${AGENT_INTERNAL_AUTH_TOKEN}
      AGENT_SERVICE_AUTH_TOKEN: ${AGENT_SERVICE_AUTH_TOKEN}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen36}
      RAG_KNOWLEDGE_DIR: /knowledge
      RAG_INDEX_PATH: /state/rag-index.json
      CONFIRMATION_STORE_PATH: /state/confirmations.sqlite3
      GRAPH_CHECKPOINT_PATH: /state/graph-checkpoints.sqlite3
      GRAPH_CHECKPOINT_POSTGRES_DSN: postgresql://agent:${AGENT_POSTGRES_PASSWORD}@postgres:5432/agent_state
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
    volumes:
      - agent-state:/state
    ports: ["8000:8000"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on:
      agent-service:
        condition: service_healthy

volumes:
  agent-mysql:
  agent-redis:
  agent-state:
  agent-postgres:
  backend-uploads:

server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    database: ${sky.redis.database}
    password: ${sky.redis.password}

mybatis:
  #mapperй–°е¶Үз–ҶйҸӮеӣҰж¬ў
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #еҜ®вӮ¬йҚҡоҲһв”ҳе®„жқҝжҮЎйҚҡ?
    map-underscore-to-camel-case: true

logging:
  charset:
    console: GBK
    file: UTF-8
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  agent-service:
    base-url: ${AGENT_SERVICE_BASE_URL:http://127.0.0.1:8000}
    # Java -> Python and Python -> Java must use different shared secrets.
    # Override these values with environment variables outside local development.
    auth-token: ${AGENT_SERVICE_AUTH_TOKEN:local-agent-token}
    internal-auth-token: ${AGENT_INTERNAL_AUTH_TOKEN:local-internal-token}
    internal-writes-enabled: ${AGENT_INTERNAL_WRITES_ENABLED:true}
    connect-timeout: ${AGENT_SERVICE_CONNECT_TIMEOUT:3000}
    read-timeout: ${AGENT_SERVICE_READ_TIMEOUT:120000}
  jwt:
    # з’Ғеү§з–Ҷjwtз»ӣжғ§жӮ•йҚ”зҠІзҳ‘йҸғжңөеЁҮйҗўг„§ж®‘з»үж©ҖжҢң
    admin-secret-key: itcast
    # з’Ғеү§з–Ҷjwtжқ©еӣЁж№ЎйҸғе •жЈҝ
    admin-ttl: 7200000
    # з’Ғеү§з–ҶйҚ“е¶ҮоҒ¬жөјзҠ»вӮ¬жҺ•з№ғйҸүгғ§ж®‘жө гӮҮеўқйҚҡе¶ҮРһ
    admin-token-name: token
    user-secret-key: jwdlh
    # йҗўг„Ұеҹӣз»”?JWT йҸҲеӨӢжҷҘйҸҲзҮӮзҙ°2 зҒҸеҝ”жӨӮй”ӣе қеҙҹжөЈе¶Ҹзҙ°е§ЈоӮӨоқ—й”ӣ?
    user-ttl: 7200000
    user-token-name: authentication

  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}


